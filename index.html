<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 10 · Perimeter & Area</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --grass:#3D7A23;--grass2:#2A5C17;--grass-light:#A8D878;
  --earth:#8B6914;--earth2:#6B4A0A;--earth-light:#D4A843;
  --wood:#9B6B2A;--wood2:#7A5020;
  --sky:#D4E8F0;--sky2:#B8D8E8;
  --fence:#F5E8C8;--fence2:#D4C08A;
  --red:#C0392B;--blue:#2471A3;
  --paper:#F8F3E8;--paper2:#EDE4D0;
  --ink:#1A1208;--ink2:#4A3A1A;--ink3:#8A7050;
  --rule:#C8B890;
  --sans:'Syne',sans-serif;--serif:'Instrument Serif',serif;--mono:'Space Mono',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);overflow-x:hidden}

.header{background:var(--grass);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;
  border-bottom:3px solid var(--grass2);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.header-title{font-family:var(--serif);font-size:22px;color:#F8FFF0;font-style:italic}
.header-sub{font-family:var(--mono);font-size:10px;color:rgba(248,255,240,0.55);letter-spacing:1.5px;text-transform:uppercase}
.header-tabs{margin-left:auto;display:flex;gap:0;background:rgba(0,0,0,0.2);border-radius:8px;padding:3px}
.tab{padding:7px 18px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:rgba(248,255,240,0.55);cursor:pointer;border-radius:6px;transition:.2s;border:none;background:none}
.tab.on{background:var(--paper);color:var(--ink);font-weight:700}
.tab:hover:not(.on){color:rgba(248,255,240,0.85)}

.main{max-width:900px;margin:0 auto;padding:24px 16px 60px;position:relative;z-index:1}

/* FARM CANVAS */
.farm-wrap{border-radius:12px;overflow:hidden;border:3px solid var(--earth2);box-shadow:0 8px 32px rgba(0,0,0,0.25);margin-bottom:20px}
#farm-canvas{display:block;cursor:crosshair}

/* CONTROLS */
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.mode-btn{
  display:flex;align-items:center;gap:6px;padding:10px 20px;
  background:var(--paper2);border:2px solid var(--rule);border-radius:8px;
  font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:.2s;color:var(--ink2);
}
.mode-btn.on{background:var(--earth-light);border-color:var(--earth);color:var(--earth2)}
.mode-btn:hover:not(.on){border-color:var(--grass)}
.mode-icon{font-size:18px}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--paper);border:2px solid var(--rule);border-radius:10px;padding:16px 18px;text-align:center}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.stat-value{font-family:var(--mono);font-size:32px;font-weight:700}
.stat-unit{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.stat-p .stat-value{color:var(--red)}
.stat-a .stat-value{color:var(--grass)}

/* CHALLENGE */
.challenge-area{background:var(--earth-light);border:2px solid var(--earth);border-radius:10px;padding:16px 18px;margin-bottom:16px}
.challenge-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--earth2);margin-bottom:6px}
.challenge-text{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink);line-height:1.6}
.challenge-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ch-btn{padding:7px 16px;background:var(--earth);color:#fff;border:none;border-radius:6px;
  font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.ch-btn:hover{background:var(--earth2)}

/* REVEAL */
.reveal-box{background:#FEF9C3;border:2px solid #CA8A04;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:none}
.reveal-box.show{display:block;animation:slideIn .4s ease}
.reveal-text{font-family:var(--serif);font-style:italic;font-size:15px;color:#78350F;line-height:1.7}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* PRACTICE */
.practice-card{background:var(--paper);border:2px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:16px}
.practice-q{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink);margin-bottom:16px;line-height:1.6}
.ans-opts{display:flex;gap:8px;flex-wrap:wrap}
.ans-opt{padding:10px 20px;background:var(--paper2);border:2px solid var(--rule);border-radius:8px;
  font-family:var(--mono);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;color:var(--ink)}
.ans-opt:hover{border-color:var(--grass);background:#DCFCE7;color:var(--grass2)}
.ans-opt.correct{background:#DCFCE7;border-color:#16A34A;color:#14532D;animation:pop .35s ease}
.ans-opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#7F1D1D;animation:shk .35s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pq-fb{min-height:24px;margin-top:12px;font-family:var(--serif);font-style:italic;font-size:14px}
.pq-fb.ok{color:#16A34A}.pq-fb.no{color:#DC2626}
.next-btn{margin-top:14px;background:var(--grass);color:#fff;border:none;border-radius:8px;padding:10px 24px;
  font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.next-btn:hover{background:var(--grass2)}

.reset-btn{background:var(--paper2);border:2px solid var(--rule);border-radius:8px;padding:8px 16px;
  font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;color:var(--ink2);transition:.2s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

.pnl{display:none}.pnl.on{display:block}

@media(max-width:600px){
  .header{height:auto;padding:10px 16px;flex-wrap:wrap;gap:8px}
  .header-tabs{width:100%;justify-content:center}
  .stats{grid-template-columns:1fr 1fr}
  .stat-value{font-size:24px}
}
</style>
</head>
<body>

<div class="header">
  <svg width="36" height="36" viewBox="0 0 36 36" style="flex-shrink:0">
    <rect x="2" y="2" width="32" height="32" rx="6" fill="rgba(255,255,255,0.15)"/>
    <rect x="8" y="8" width="20" height="20" fill="none" stroke="#A8D878" stroke-width="2" stroke-dasharray="3,2"/>
    <path d="M8 8 L28 8 L28 28 L8 28 Z" fill="rgba(168,216,120,0.2)"/>
    <rect x="6" y="7" width="24" height="2" rx="1" fill="#D4A843"/>
  </svg>
  <div>
    <div class="header-title">Fence Builder Farm</div>
    <div class="header-sub">Chapter 10 · Perimeter &amp; Area</div>
  </div>
  <div class="header-tabs">
    <button class="tab on" onclick="switchTab('farm')">Farm</button>
    <button class="tab" onclick="switchTab('practice')">Practice</button>
  </div>
</div>

<div class="main">

<div class="pnl on" id="pnl-farm">
  <div class="stats">
    <div class="stat-card stat-p">
      <div class="stat-label">Perimeter (Fence used)</div>
      <div class="stat-value" id="peri-val">0</div>
      <div class="stat-unit">metres</div>
    </div>
    <div class="stat-card stat-a">
      <div class="stat-label">Area (Grass inside)</div>
      <div class="stat-value" id="area-val">0</div>
      <div class="stat-unit">m²</div>
    </div>
  </div>

  <div class="controls">
    <button class="mode-btn on" id="mb-fence" onclick="setMode('fence')">
      <span class="mode-icon">🪵</span> Fence mode
    </button>
    <button class="mode-btn" id="mb-paint" onclick="setMode('paint')">
      <span class="mode-icon">🌿</span> Fill mode
    </button>
    <button class="reset-btn" onclick="resetFarm()">✕ Clear</button>
    <div style="font-family:var(--mono);font-size:10px;color:var(--ink3);padding-left:4px">Click grid squares to place fence</div>
  </div>

  <div class="farm-wrap">
    <canvas id="farm-canvas"></canvas>
  </div>

  <div class="challenge-area">
    <div class="challenge-title">Challenge</div>
    <div class="challenge-text" id="ch-text">Draw a fence enclosure on the grid. Switch to Fill mode to colour the inside. Discover how perimeter and area relate!</div>
    <div class="challenge-btns">
      <button class="ch-btn" onclick="setChallenge('biggest')">Biggest area with 20m fence</button>
      <button class="ch-btn" onclick="setChallenge('smallest')">Smallest area with 20m fence</button>
      <button class="ch-btn" onclick="setChallenge('equal-p')">Equal perimeter, different area</button>
    </div>
  </div>

  <div class="reveal-box" id="reveal-box">
    <div class="reveal-text" id="reveal-text"></div>
  </div>
</div>

<div class="pnl" id="pnl-practice">
  <div class="practice-card">
    <div class="practice-q" id="pq-text">Loading…</div>
    <div class="ans-opts" id="pq-opts"></div>
    <div class="pq-fb" id="pq-fb"></div>
    <button class="next-btn" onclick="nextPQ()">Next →</button>
  </div>
</div>

</div>

<script>
// -- GRID SETUP --
const CELL = 32;
const COLS = 15, ROWS = 12;
const cvs = document.getElementById('farm-canvas');
const ctx = cvs.getContext('2d');

// Make canvas responsive
function resize(){
  const wrap = cvs.parentElement;
  const maxW = Math.min(wrap.clientWidth, 900);
  const scale = maxW / (COLS*CELL);
  cvs.width = COLS*CELL;
  cvs.height = ROWS*CELL;
  cvs.style.width = maxW+'px';
  cvs.style.height = Math.round(ROWS*CELL*scale)+'px';
}
resize();
window.addEventListener('resize', ()=>{resize();draw()});

let grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
// grid values: 0=empty, 1=fence, 2=grass
let mode = 'fence';
let painting = false;

// -- DRAWING --
function draw(){
  const W=COLS*CELL, H=ROWS*CELL;
  // Sky / ground
  ctx.fillStyle='#B8D8E8'; ctx.fillRect(0,0,W,H);
  // Ground rows
  for(let r=0;r<ROWS;r++){
    const g=ctx.createLinearGradient(0,r*CELL,0,(r+1)*CELL);
    g.addColorStop(0,r%2===0?'#4A8C2A':'#3D7A23');
    g.addColorStop(1,r%2===0?'#3D7A23':'#356B1E');
    ctx.fillStyle=g;
    ctx.fillRect(0,r*CELL,W,CELL);
  }

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke()}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke()}

  // Cells
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const v=grid[r][c];
      const x=c*CELL,y=r*CELL;
      if(v===2){
        // Grass fill
        ctx.fillStyle='#A8D878';
        ctx.globalAlpha=0.7;
        ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        ctx.globalAlpha=1;
        // grass texture dots
        ctx.fillStyle='#6AAB40';
        for(let i=0;i<4;i++){
          ctx.beginPath();ctx.arc(x+6+i*7,y+CELL/2+((i%2)-.5)*4,1.5,0,Math.PI*2);ctx.fill();
        }
      }
      if(v===1){
        // Fence post
        ctx.fillStyle='#D4B870';
        ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
        ctx.fillStyle='#B89A40';
        ctx.fillRect(x+2,y+2,CELL-4,6);
        // Wood grain
        ctx.strokeStyle='rgba(120,80,20,0.3)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(x+4,y+4);ctx.lineTo(x+CELL-4,y+4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+4,y+10);ctx.lineTo(x+CELL-4,y+10);ctx.stroke();
      }
    }
  }

  // Sheep emoji if area detected
  const areaCount=grid.flat().filter(v=>v===2).length;
  if(areaCount>4){
    const sheep=['?','?','?'];
    const grassCells=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]===2)grassCells.push({r,c});
    if(grassCells.length){
      ctx.font=`${Math.round(CELL*0.7)}px serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const picks=grassCells.slice(0,Math.min(3,grassCells.length));
      picks.forEach((cell,i)=>{
        ctx.fillText(sheep[i]||'?',cell.c*CELL+CELL/2,cell.r*CELL+CELL/2);
      });
    }
  }

  updateStats();
}

// -- STATS --
function updateStats(){
  const fenceCount = grid.flat().filter(v=>v===1).length;
  const areaCount = grid.flat().filter(v=>v===2).length;
  document.getElementById('peri-val').textContent=fenceCount;
  document.getElementById('area-val').textContent=areaCount;
  checkReveal(fenceCount,areaCount);
}

function checkReveal(p,a){
  const rb=document.getElementById('reveal-box');
  const rt=document.getElementById('reveal-text');
  if(p>=8&&a>=0){
    const msg=a===0?`You have ${p} metres of fence but no enclosed area yet. Use Fill mode to colour the inside!`
      :`With ${p}m of fence you enclosed ${a}m? of grass. ${p===a?'':'Try changing the shape - does a different rectangle with '+p+'m of fence give more grass?'}`;
    rt.textContent=msg;
    rb.classList.add('show');
  } else {rb.classList.remove('show')}
}

// -- INTERACTION --
function cellFromEvent(e){
  const rect=cvs.getBoundingClientRect();
  const scaleX=cvs.width/rect.width;
  const px=(e.clientX-rect.left)*scaleX;
  const py=(e.clientY-rect.top)*scaleX;
  return{c:Math.floor(px/CELL),r:Math.floor(py/CELL)};
}

function handleCell(e){
  const{r,c}=cellFromEvent(e);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  if(mode==='fence'){
    grid[r][c]=grid[r][c]===1?0:1;
  } else {
    grid[r][c]=grid[r][c]===2?0:2;
  }
  draw();
}

cvs.addEventListener('mousedown',e=>{painting=true;handleCell(e)});
cvs.addEventListener('mousemove',e=>{if(painting)handleCell(e)});
cvs.addEventListener('mouseup',()=>painting=false);
cvs.addEventListener('mouseleave',()=>painting=false);
cvs.addEventListener('touchstart',e=>{e.preventDefault();painting=true;handleCell(e.touches[0])},{passive:false});
cvs.addEventListener('touchmove',e=>{e.preventDefault();if(painting)handleCell(e.touches[0])},{passive:false});
cvs.addEventListener('touchend',()=>painting=false);

function setMode(m){
  mode=m;
  document.getElementById('mb-fence').classList.toggle('on',m==='fence');
  document.getElementById('mb-paint').classList.toggle('on',m==='paint');
}

function resetFarm(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  draw();
  document.getElementById('reveal-box').classList.remove('show');
}

// -- CHALLENGES --
function setChallenge(t){
  const msgs={
    'biggest':'Use EXACTLY 20 fence squares to make the biggest possible enclosed area. Hint: squares are usually better than long thin rectangles!',
    'smallest':'Use EXACTLY 20 fence squares to make the smallest possible enclosed area. Try a very long, thin shape!',
    'equal-p':'Draw two shapes that both have the same perimeter. Do they have the same area inside? (They won\'t - and that\'s the big idea!)',
  };
  document.getElementById('ch-text').textContent=msgs[t];
  resetFarm();
}

// -- PRACTICE --
const Qs=[
  {q:'A rectangle is 5m long and 3m wide. What is its perimeter?',ans:'16 m',opts:['8 m','15 m','16 m','20 m'],exp:'2?(5+3) = 16 m'},
  {q:'A square has a side of 7m. What is its area?',ans:'49 m?',opts:['28 m?','49 m?','28 m','14 m?'],exp:'7?7 = 49 m?'},
  {q:'A rectangle is 8m long and 4m wide. What is its area?',ans:'32 m?',opts:['24 m?','32 m?','48 m?','24 m'],exp:'8?4 = 32 m?'},
  {q:'Perimeter of a square = 36m. What is the side length?',ans:'9 m',opts:['4 m','6 m','9 m','12 m'],exp:'36 ? 4 = 9 m'},
  {q:'Two rectangles both have perimeter 20m. Can they have different areas?',ans:'Yes',opts:['Yes','No','Only if square','Impossible to tell'],exp:'Example: 6?4=24m? vs 8?2=16m?. Same perimeter, different area!'},
  {q:'A rectangle has area 24m? and one side 6m. Other side?',ans:'4 m',opts:['3 m','4 m','6 m','18 m'],exp:'24 ? 6 = 4 m'},
  {q:'Which has the larger area: a 5m?5m square or a 7m?3m rectangle?',ans:'5m?5m square',opts:['5m?5m square','7m?3m rectangle','They are equal','Impossible to say'],exp:'25 m? vs 21 m? - the square wins!'},
];
let qi=0,usedQ=[];
function nextPQ(){
  if(usedQ.length>=Qs.length)usedQ=[];
  let idx;do{idx=Math.floor(Math.random()*Qs.length)}while(usedQ.includes(idx));
  usedQ.push(idx);qi=idx;
  const q=Qs[idx];
  document.getElementById('pq-text').textContent=q.q;
  document.getElementById('pq-fb').textContent='';
  document.getElementById('pq-fb').className='pq-fb';
  const opts=document.getElementById('pq-opts');
  opts.innerHTML='';
  [...q.opts].sort(()=>Math.random()-.5).forEach(o=>{
    const b=document.createElement('button');
    b.className='ans-opt';b.textContent=o;
    b.onclick=()=>{
      opts.querySelectorAll('.ans-opt').forEach(x=>x.onclick=null);
      const ok=o===q.ans;
      b.classList.add(ok?'correct':'wrong');
      if(!ok)opts.querySelectorAll('.ans-opt').forEach(x=>{if(x.textContent===q.ans)x.classList.add('correct')});
      const fb=document.getElementById('pq-fb');
      fb.textContent=(ok?'? Correct! ':'? ')+q.exp;
      fb.className='pq-fb '+(ok?'ok':'no');
    };
    opts.appendChild(b);
  });
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().includes(t==='farm'?'farm':'prac')));
  document.getElementById('pnl-farm').classList.toggle('on',t==='farm');
  document.getElementById('pnl-practice').classList.toggle('on',t==='practice');
  if(t==='practice')nextPQ();
}

draw();
</script>
</body>
</html>
